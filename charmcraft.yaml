name: authentik-worker
type: charm
title: Authentik Worker Operator
summary: Operator for Authentik Worker
description: |
    Operator for Authentik Worker
links:
  source: https://github.com/canonical/authenik-worker-operator
  issues: https://github.com/canonical/authenik-worker-operator/issues

charm-user: non-root
platforms:
  ubuntu@22.04:amd64:

assumes:
  - juju >= 3.0.2
  - k8s-api

config:
  options:
    http_proxy:
      description: URL of the HTTP proxy eg http://proxy.internal:6666, it will set the HTTP_PROXY var in the workload environment
      type: string
      default: ''
    https_proxy:
      description: URL of the HTTPS proxy eg http://proxy.internal:6666, it will set the HTTPS_PROXY var in the workload environment
      type: string
      default: ''
    no_proxy:
      description: Domains that need to be excluded from proxying no_proxy="test.com,test.co.uk", it is a comma separate list
      type: string
      default: ''
    log_level:
      description: |
        Configures the log level.

        Acceptable values are: "info", "debug", "warning", "error" and "critical"
      default: "info"
      type: string
    cpu:
      description: |
        K8s cpu resource limit, e.g. "1" or "500m". Default is unset (no limit). This value is used
        for the "limits" portion of the resource requirements (the "requests" portion is
        automatically deduced from it).
        See https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
      type: string
    memory:
      description: |
        K8s memory resource limit, e.g. "1Gi". Default is unset (no limit). This value is used
        for the "limits" portion of the resource requirements (the "requests" portion is
        automatically deduced from it).
        See https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
      type: string
    worker_processes:
      description: |
        Number of worker processes to start. Each process runs independently and picks up tasks
        from the PostgreSQL queue. In environments where scaling with multiple replicas is not
        possible, this can be increased to handle higher loads.
        Maps to AUTHENTIK_WORKER__PROCESSES.
      type: int
      default: 1
    worker_threads:
      description: |
        Number of Dramatiq threads per worker process. A value below 2 is not recommended unless
        you have multiple worker replicas.
        Maps to AUTHENTIK_WORKER__THREADS.
      type: int
      default: 2
    task_max_retries:
      description: |
        Number of times a failing task will be retried before it is abandoned.
        Maps to AUTHENTIK_WORKER__TASK_MAX_RETRIES.
      type: int
      default: 5
    task_default_time_limit:
      description: |
        Default duration (in seconds) a task can run before it is aborted. Some tasks (e.g. LDAP
        source sync) will override this with their own limit.
        Maps to AUTHENTIK_WORKER__TASK_DEFAULT_TIME_LIMIT.
      type: int
      default: 600
    task_expiration_days:
      description: |
        How many days completed tasks are kept in the database before they are deleted.
        Maps to AUTHENTIK_WORKER__TASK_EXPIRATION.
      type: int
      default: 30

actions:

requires:
  authentik-cluster:
    interface: authentik_cluster
    optional: true
  logging:
    interface: loki_push_api
    optional: true
  tracing:
    interface: tracing
    limit: 1
    optional: true
    description: |
      Provides traces to COS Tempo instance


provides:
  metrics-endpoint:
    interface: prometheus_scrape
    optional: true
    description: |
      Provides application metrics to COS Prometheus instance

containers:
  authentik:
    gid: 584792
    uid: 584792
    resource: oci-image

resources:
  oci-image:
    type: oci-image
    description: OCI image for authentik-worker
    upstream-source: ghcr.io/canonical/authentik-server:2026.5.3

parts:
  charm:
    charm-binary-python-packages:
      - jsonschema
      - "pydantic>=2"
      - "setuptools>=70.0.0"
    build-packages:
      - "rustc-1.85"
      - "cargo-1.85"
